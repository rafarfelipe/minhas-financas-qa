name: CI - Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'
      - run: dotnet restore BackendTests/BackendTests.slnx
      - run: dotnet test BackendTests/UnitTests/UnitTests.csproj --no-restore --logger "trx" --logger "console;verbosity=normal"

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'
      - run: dotnet restore BackendTests/BackendTests.slnx
      - run: dotnet test BackendTests/IntegrationTests/IntegrationTests.csproj --no-restore --logger "trx" --logger "console;verbosity=normal"

  frontend-unit:
    name: Frontend Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - working-directory: web
        run: npm ci
      - working-directory: web
        run: npx vitest run
